name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" --title "${tag#v}" --notes ""
          fi

  release:
    needs: create_release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Prepare icon
        run: node -e "require('fs').mkdirSync('build',{recursive:true});require('fs').copyFileSync('public/assets/logo.png','build/icon.png')"

      - name: Build and upload linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          npx electron-builder --linux --publish never
          shopt -s nullglob
          files=()
          for file in release/*; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nenhum artefato de release foi gerado."
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload mac
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then
            echo "Building signed mac release"
            export CSC_LINK='${{ secrets.MAC_CSC_LINK }}'
            export CSC_KEY_PASSWORD='${{ secrets.MAC_CSC_KEY_PASSWORD }}'
            export APPLE_ID='${{ secrets.APPLE_ID }}'
            export APPLE_APP_SPECIFIC_PASSWORD='${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}'
            export APPLE_TEAM_ID='${{ secrets.APPLE_TEAM_ID }}'
          else
            echo "Building unsigned mac release"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          fi
          npx electron-builder --mac dmg zip --publish never
          shopt -s nullglob
          files=()
          for file in release/*; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nenhum artefato de release foi gerado."
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload win
        if: matrix.platform == 'win'
        shell: bash
        run: |
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          if [ -n "${{ secrets.WIN_CSC_LINK }}" ]; then
            echo "Building signed windows release"
            export CSC_LINK='${{ secrets.WIN_CSC_LINK }}'
            export CSC_KEY_PASSWORD='${{ secrets.WIN_CSC_KEY_PASSWORD }}'
          else
            echo "Building unsigned windows release"
            unset CSC_LINK CSC_KEY_PASSWORD
          fi
          npx electron-builder --win --publish never
          shopt -s nullglob
          files=()
          for file in release/*; do
            if [ -f "$file" ]; then
              files+=("$file")
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nenhum artefato de release foi gerado."
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
